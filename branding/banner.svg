<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" fill="none" role="img" aria-label="ReviewFlow GitHub banner">
  <title>ReviewFlow</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0.08"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#334155" stroke-width="0.5" opacity="0.4"/>
    </pattern>
  </defs>
  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#grid)"/>
  <ellipse cx="1050" cy="120" rx="300" ry="200" fill="url(#accent)"/>
  <ellipse cx="200" cy="520" rx="250" ry="180" fill="url(#accent)"/>
  <!-- Large mark -->
  <g transform="translate(120, 200) scale(2)">
    <path d="M10 10 C10 18 14 24 20 28" stroke="#06B6D4" stroke-width="3.5" stroke-linecap="round" fill="none"/>
    <circle cx="10" cy="10" r="3.5" fill="#06B6D4"/>
    <path d="M54 10 C54 18 50 24 44 28" stroke="#3B82F6" stroke-width="3.5" stroke-linecap="round" fill="none"/>
    <circle cx="54" cy="10" r="3.5" fill="#3B82F6"/>
    <rect x="17" y="26" width="30" height="20" rx="4" fill="#3B82F6"/>
    <line x1="22" y1="32" x2="38" y2="32" stroke="#F8FAFC" stroke-width="2" stroke-linecap="round"/>
    <line x1="22" y1="36" x2="42" y2="36" stroke="#F8FAFC" stroke-width="2" stroke-linecap="round"/>
    <line x1="22" y1="40" x2="35" y2="40" stroke="#F8FAFC" stroke-width="2" stroke-linecap="round"/>
    <path d="M32 46 L32 54" stroke="#06B6D4" stroke-width="3.5" stroke-linecap="round"/>
    <circle cx="32" cy="56" r="3" fill="#06B6D4"/>
  </g>
  <!-- Title -->
  <text x="340" y="290" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="72" font-weight="700" letter-spacing="-1.5">
    <tspan fill="#F8FAFC">Review</tspan><tspan fill="#06B6D4">Flow</tspan>
  </text>
  <!-- Tagline -->
  <text x="340" y="360" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="32" font-weight="400" fill="#94A3B8" letter-spacing="-0.3">
    Review code where you write it.
  </text>
  <!-- Platforms -->
  <text x="340" y="420" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="22" font-weight="500" fill="#64748B" letter-spacing="0.5">
    Cursor  "  VS Code  "  GitLab
  </text>
  <!-- Accent line -->
  <rect x="340" y="390" width="80" height="3" rx="1.5" fill="#06B6D4"/>
</svg>
